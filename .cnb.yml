main:
  push:
    - name: build-and-deploy
      docker:
        image: node:22
      env:
        PUBLIC_CWD_API_BASE_URL: https://blog.kiwi.moe/api/cwd
        PUBLIC_CWD_SITE_ID: mojian
        SITE: https://blog.kiwi.moe
      imports:
        - https://cnb.cool/kiwimoe/secrets/-/blob/main/blog.yml
      stages:
        - name: install
          script: npm install
        - name: build-admin
          script: npm run build:admin
        - name: build-site
          script: npx astro build && node scripts/verify-llm-artifacts.mjs
        - name: deploy
          script: npx wrangler pages deploy dist --project-name blog-kiwi-moe

  web_trigger_deploy:
    - name: manual-deploy
      docker:
        image: node:22
      env:
        PUBLIC_CWD_API_BASE_URL: https://blog.kiwi.moe/api/cwd
        PUBLIC_CWD_SITE_ID: mojian
        SITE: https://blog.kiwi.moe
      imports:
        - https://cnb.cool/kiwimoe/secrets/-/blob/main/blog.yml
      stages:
        - name: install
          script: npm install
        - name: diagnostics
          script:
            - echo "=== env check ==="
            - echo "NOTION_TOKEN set: $([ -n "$NOTION_TOKEN" ] && echo yes || echo no)"
            - echo "NOTION_DATA_SOURCE_ID set: $([ -n "$NOTION_DATA_SOURCE_ID" ] && echo yes || echo no)"
            - echo "CLOUDFLARE_API_TOKEN set: $([ -n "$CLOUDFLARE_API_TOKEN" ] && echo yes || echo no)"
            - echo "=== network check ==="
            - curl -s -o /dev/null -w "notion api: %{http_code}\n" https://api.notion.com/v1/users/me -H "Authorization: Bearer $NOTION_TOKEN" -H "Notion-Version: 2026-03-11"
        - name: sync-notion
          script: npm run sync:notion
        - name: build-admin
          script: npm run build:admin
        - name: build-site
          script: npx astro build && node scripts/verify-llm-artifacts.mjs
        - name: deploy
          script: npx wrangler pages deploy dist --project-name blog-kiwi-moe